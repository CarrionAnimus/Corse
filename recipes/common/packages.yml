modules:
  - type: rpm-ostree
    remove:
      - firefox
      - firefox-langpacks
      - htop
      - ublue-os-update-services

  - type: rpm-ostree
    install:
      # Vulkan Mesa GL
      - ddcutil
      - vulkan-loader
      - vulkan-validation-layers
      - vulkan-tools
      - mesa-dri-drivers
      - mesa-vulkan-drivers
      - mesa-va-drivers
      - mesa-libxatracker
      - mesa-libglapi
      - mesa-libgbm
      - mesa-libEGL
      - mesa-libGL
      - mesa-libGLU
      - mesa-libGLw

      # Xwayland
      - xorg-x11-server-Xwayland

  - type: rpm-ostree
    install:
      # Pipewire
      - pipewire
      - pipewire-alsa
      - pipewire-gstreamer
      - pipewire-jack-audio-connection-kit
      - pipewire-jack-audio-connection-kit-libs
      - pipewire-libs
      - pipewire-pulseaudio
      - pipewire-utils
      - pipewire-plugin-libcamera
      - wireplumber
      - pulseaudio-utils
      - pamixer
      - pavucontrol
      - helvum

  - type: rpm-ostree
    install:
      # Bluez
      - bluez
      - bluez-obexd
      - bluez-cups
      - bluez-libs
      - bluez-tools
      - blueman

  - type: rpm-ostree
    install:
      - power-profiles-daemon
      - polkit
      - xdg-user-dirs
      - dbus-tools
      - dbus-daemon
      - wl-clipboard
      - playerctl

  - type: rpm-ostree
    install:
      # gvfs
      - gvfs-mtp
      - gvfs-gphoto2
      - gvfs-smb
      - gvfs-nfs
      - gvfs-fuse
      - gvfs-archive

  - type: rpm-ostree
    install:
      # Qt
      - qt5-qtwayland
      - qt6-qtwayland

      # sddm
      - sddm
      - sddm-themes
      - qt6-qtdeclarative
      - qt6-qtsvg
      - qt6-qt5compat
      - kwallet
      - pam-kwallet

  - type: rpm-ostree
    repos:
      - https://copr.fedorainfracloud.org/coprs/kylegospo/obs-vkcapture/repo/fedora-%OS_VERSION%/kylegospo-obs-vkcapture-fedora-%OS_VERSION%.repo?arch=x86_64
      - https://copr.fedorainfracloud.org/coprs/ublue-os/staging/repo/fedora-%OS_VERSION%/ublue-os-staging-fedora-%OS_VERSION%.repo?arch=x86_64
    install:
      # Kernel
      - scx-scheds

      # vkcapture
      - libobs_vkcapture.x86_64
      - libobs_glcapture.x86_64
      - libobs_vkcapture.i686
      - libobs_glcapture.i686

      #- ublue-update

  - type: rpm-ostree
    repos:
      - https://copr.fedorainfracloud.org/coprs/che/nerd-fonts/repo/fedora-%OS_VERSION%/che-nerd-fonts-fedora-%OS_VERSION%.repo
    install:
      # Fonts
      - google-noto-emoji-fonts
      - nerd-fonts
      - twitter-twemoji-fonts

      # Icons
      - papirus-icon-theme

  - type: rpm-ostree
    install:
      # Containers
      - podman
      - podman-compose
      - buildah
      - distrobox

  - type: rpm-ostree
    install:
      # terminal
      - foot
      - imv
      - mpv
      - xarchiver
      - p7zip
      - unrar
      - yt-dlp
      - android-tools
      - zsh
      - pipx
      - fastfetch
      - btop
      - neovim
      - bat
      - eza
      - gum
      - glow
      - ncdu
      - poppler
      - fd-find
      - ImageMagick
      - gh
      - glab
      - tealdeer
      - ugrep
      - yq
      - zoxide
      - ShellCheck
      - wget
      - aria2
      - libsixel
      - libsixel-utils

  - type: rpm-ostree
    repos:
      - charm.repo
      - https://copr.fedorainfracloud.org/coprs/atim/starship/repo/fedora-%OS_VERSION%/atim-starship-fedora-%OS_VERSION%.repo
      - https://copr.fedorainfracloud.org/coprs/varlad/zellij/repo/fedora-%OS_VERSION%/varlad-zellij-fedora-%OS_VERSION%.repo
      - https://copr.fedorainfracloud.org/coprs/ilyaz/LACT/repo/fedora-%OS_VERSION%/ilyaz-LACT-fedora-%OS_VERSION%.repo
    keys:
      - https://repo.charm.sh/yum/gpg.key
    install:
      # cli
      - starship
      - zellij

      # Linux GPU configuration utility
      - lact

      # opentabletdriver
      - https://raw.githubusercontent.com/CarrionAnimus/Corse/main/files/rpm/opentabletdriver-0.6.4.0-1.fc%OS_VERSION%.x86_64.rpm