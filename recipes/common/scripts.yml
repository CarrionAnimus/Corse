modules:
  - type: files
    files:
      - source: system/common
        destination: /

  - type: systemd
    system:
      enabled:
        - sddm-boot.service
        - scx.service
        - lactd.service
      disable:
        - rpm-ostreed-automatic.timer

  - type: script
    scripts:
      - kernel_options.sh
      - image_name.sh

  - type: script
    scripts:
      - build-initramfs.sh