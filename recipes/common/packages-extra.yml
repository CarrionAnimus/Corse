modules:
  - type: rpm-ostree
    repos:
      - charm.repo
      - https://copr.fedorainfracloud.org/coprs/atim/starship/repo/fedora-%OS_VERSION%/atim-starship-fedora-%OS_VERSION%.repo
      - https://copr.fedorainfracloud.org/coprs/varlad/zellij/repo/fedora-%OS_VERSION%/varlad-zellij-fedora-%OS_VERSION%.repo
      - https://copr.fedorainfracloud.org/coprs/ilyaz/LACT/repo/fedora-%OS_VERSION%/ilyaz-LACT-fedora-%OS_VERSION%.repo
    keys:
      - https://repo.charm.sh/yum/gpg.key
    install:
      # Files & Media
      - xarchiver
      - p7zip
      - unrar
      - gvfs-mtp
      - gvfs-gphoto2
      - gvfs-smb
      - gvfs-nfs
      - gvfs-fuse
      - gvfs-archive
      - imv
      - mpv

      # terminal
      - foot

      # Containers
      - podman
      - podman-compose
      - buildah
      - distrobox

      # cli tools
      - yt-dlp
      - android-tools
      - zsh
      - pipx
      - fastfetch
      - btop
      - neovim
      - bat
      - eza
      - gum
      - glow
      - ncdu
      - poppler
      - fd-find
      - ImageMagick
      - gh
      - glab
      - tealdeer
      - ugrep
      - yq
      - zellij
      - zoxide
      - ShellCheck
      - starship
      - wget
      - aria2
      - libsixel
      - libsixel-utils

      # Linux GPU configuration utility
      - lact

      # opentabletdriver
      - https://raw.githubusercontent.com/CarrionAnimus/Corse/main/files/rpm/opentabletdriver-0.6.4.0-1.fc%OS_VERSION%.x86_64.rpm
